name: AI Code Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GEMINI_MODEL: gemini-2.5-flash

    steps:
      - name: Checkout base branch (safe for pull_request_target)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get PR diff
        if: ${{ github.event_name == 'pull_request_target' }}
        run: |
          set -euo pipefail
          curl -sSL \
            -H "Accept: application/vnd.github.v3.diff" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.event.pull_request.url }}" \
            > pr.diff

          # Limita tamanho para evitar payloads gigantes e custo elevado.
          head -c 200000 pr.diff > pr.diff.trimmed

      - name: Build prompt
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Workflow manual: sem pull request associado." > pr.diff.trimmed
          fi

          cat > prompt.txt << 'EOF'
          Voce e um revisor senior de codigo.

          Analise o diff abaixo e responda estritamente neste formato:

          DECISAO: APROVADO ou REPROVADO

          PROBLEMAS:
          - ...

          SUGESTOES:
          - ...

          Regras:
          - Se houver bug, regressao funcional, falha de seguranca, quebra de contrato de API ou ausencia de teste critico, use REPROVADO.
          - Seja objetivo e priorize itens de maior impacto.

          Diff:
          EOF

          cat pr.diff.trimmed >> prompt.txt

      - name: Call Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "ERRO: segredo GEMINI_API_KEY nao configurado." > review.txt
            exit 1
          fi

          JSON=$(jq -Rs '{contents:[{parts:[{text:.}]}]}' prompt.txt)

          curl -sS \
            -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}" \
            -d "$JSON" \
            > response.json

      - name: Extract review
        run: |
          set -euo pipefail
          jq -r '.candidates[0].content.parts[0].text // "ERRO: resposta vazia"' response.json > review.txt
          cat review.txt

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            const marker = '<!-- ai-review-bot -->';
            const body = `${marker}\n${review}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if rejected
        run: |
          set -euo pipefail
          if grep -Eiq '^DECISAO:\s*REPROVADO' review.txt || grep -Eiq '\bREPROVADO\b' review.txt; then
            echo "AI reprovou o PR"
            exit 1
          fi
