version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: controle-epis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controle-epis-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: controle-epis-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3333

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}

      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      ADMIN_DEFAULT_NAME: Administrador

      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}

      DOCKER: "true"
    ports:
      - "3333:3333"
    networks:
      - controle-epis-network

  frontend:
    build:
      context: ./frontend
    container_name: controle-epis-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - controle-epis-network

volumes:
  postgres_data:

networks:
  controle-epis-network:
    driver: bridge