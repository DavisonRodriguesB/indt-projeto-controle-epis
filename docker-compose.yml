version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: controle-epis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-controle_epis}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-controle_epis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controle-epis-network

  backend:
    build:
      context: ./backend
    container_name: controle-epis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333

      JWT_SECRET: ${JWT_SECRET:-controle-epis-jwt-secret-dev}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}

      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@controle-epis.local}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
      ADMIN_DEFAULT_NAME: Administrador

      TYPEORM_SYNCHRONIZE: "true"

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-controle_epis}

      DOCKER: "true"
    ports:
      - "3333:3333"
    networks:
      - controle-epis-network

  frontend:
    build:
      context: ./frontend
    container_name: controle-epis-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - controle-epis-network

volumes:
  postgres_data:

networks:
  controle-epis-network:
    driver: bridge