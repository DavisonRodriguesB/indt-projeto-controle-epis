services:
  postgres:
    image: postgres:16-alpine
    container_name: controle-epis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: controle_epis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d controle_epis"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: controle-epis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      JWT_SECRET: controle-epis-jwt-secret-dev
      JWT_EXPIRES_IN: 1d
      ADMIN_DEFAULT_EMAIL: admin@controle-epis.local
      ADMIN_DEFAULT_PASSWORD: admin123
      ADMIN_DEFAULT_NAME: Administrador
      TYPEORM_SYNCHRONIZE: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: controle_epis
    ports:
      - "3333:3333"

volumes:
  postgres_data:
