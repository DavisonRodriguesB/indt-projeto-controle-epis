<div *ngIf="isMobileOpen" (click)="toggleMobile()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 lg:hidden"></div>

<aside 
  [class.w-64]="!isCollapsed" 
  [class.w-20]="isCollapsed"
  [class.translate-x-0]="isMobileOpen"
  [class.-translate-x-full]="!isMobileOpen"
  class="bg-white border-r border-gray-200 flex flex-col h-full pt-6 px-3 fixed inset-y-0 left-0 z-50 lg:static lg:translate-x-0 transition-all duration-300 ease-in-out">
  
  <div class="flex items-center justify-between mb-10 pl-3">
    <div class="flex items-center gap-2 overflow-hidden">
      <img src="logo.png" alt="Logo" class="w-10 h-10 object-contain shrink-0">
      <div *ngIf="!isCollapsed" class="animate-in fade-in duration-500">
        <h1 class="font-semibold text-xl text-slate-800 leading-none whitespace-nowrap">EPI PIM</h1>
        <p class="text-[10px] text-gray-500 tracking-wide uppercase">Controle de EPI</p>
      </div>
    </div>
    
    <button (click)="toggleSidebar()" class="hidden lg:flex p-1.5 hover:bg-slate-50 rounded-lg text-slate-400 hover:text-slate-600 transition-colors">
      <i class="ph text-xl" [ngClass]="isCollapsed ? 'ph-caret-double-right' : 'ph-caret-double-left'"></i>
    </button>
  </div>

  <nav class="flex-1 flex flex-col justify-between overflow-x-hidden">
    <ul class="space-y-1">
      
      <li>
        <a [routerLink]="['/dashboard']" routerLinkActive="bg-blue-50 text-blue-700 active-link" 
          class="group flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all relative">
          <i class="ph ph-squares-four text-xl shrink-0"></i>
          <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Dashboard</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/epis']" routerLinkActive="bg-blue-50 text-blue-700 active-link" 
          class="group flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
          <i class="ph ph-package text-xl shrink-0"></i>
          <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Catálogo de EPIs</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/colaboradores']" routerLinkActive="bg-blue-50 text-blue-700 active-link" 
          class="group flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
          <i class="ph ph-users text-xl shrink-0"></i>
          <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Colaboradores</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/entregas']" routerLinkActive="bg-blue-50 text-blue-700 active-link"
          class="group flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
          <i class="ph ph-clipboard-text text-xl shrink-0"></i>
          <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Movimentação</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/consulta-entregas']" routerLinkActive="bg-blue-50 text-blue-700 active-link"
          class="group flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
          <i class="ph ph-file-search text-xl shrink-0"></i>
          <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Consultar Entregas</span>
        </a>
      </li>

      <li class="pt-4">
        <p *ngIf="!isCollapsed" class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 animate-in fade-in">
          Configurações
        </p>
        
        <a [routerLink]="['/usuarios']" routerLinkActive="bg-blue-50 text-blue-700 active-link" 
          class="group flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all mb-1">
          <i class="ph ph-user-gear text-xl shrink-0"></i>
          <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Usuários</span>
        </a>

        <button (click)="toggleCadastroBase()"
          class="w-full flex items-center justify-between px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-all group focus:outline-none">
          <div class="flex items-center gap-3">
            <i class="ph ph-database text-xl text-slate-600 shrink-0"></i>
            <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Cadastros Base</span>
          </div>
          <i *ngIf="!isCollapsed" class="ph ph-caret-down text-xs transition-transform duration-300" 
             [class.rotate-180]="isCadastroBaseOpen"></i>
        </button>

        <div *ngIf="!isCollapsed" class="overflow-hidden transition-all duration-300 ease-in-out ml-4 border-l border-slate-100"
          [style.max-height]="isCadastroBaseOpen ? '250px' : '0px'" 
          [style.opacity]="isCadastroBaseOpen ? '1' : '0'">
          
          <div class="py-1 space-y-1 pr-2">
            <a routerLink="/cargos" routerLinkActive="bg-blue-50 text-blue-700 font-semibold active-link"
              class="group flex items-center gap-3 rounded-lg py-2 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
              <i class="ph ph-identification-card text-lg"></i>
              <span>Cargos</span>
            </a>

            <a routerLink="/setores" routerLinkActive="bg-blue-50 text-blue-700 font-semibold active-link"
              class="group flex items-center gap-3 rounded-lg py-2 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
              <i class="ph ph-tree-structure text-lg"></i>
              <span>Setores</span>
            </a>

            <a routerLink="/categorias" routerLinkActive="bg-blue-50 text-blue-700 font-semibold active-link"
              class="group flex items-center gap-3 rounded-lg py-2 px-3 text-sm font-medium text-gray-500 hover:bg-slate-50 transition-all">
              <i class="ph ph-tag text-lg"></i>
              <span>Categorias</span>
            </a>
          </div>
        </div>
      </li>
    </ul>

    <div class="border-t border-gray-100 pt-4 pb-8">      
      <a [routerLink]="['/login']" class="flex items-center gap-3 rounded-lg py-2.5 px-3 text-sm font-medium text-gray-500 hover:bg-red-50 hover:text-red-600 transition-all">
        <i class="ph ph-sign-out text-xl shrink-0"></i>
        <span *ngIf="!isCollapsed" class="animate-in slide-in-from-left-2">Sair</span>
      </a>
    </div>
  </nav>
  
</aside>
