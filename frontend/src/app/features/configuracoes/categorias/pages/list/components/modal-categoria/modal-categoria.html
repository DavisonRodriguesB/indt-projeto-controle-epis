<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-300" (click)="handleClose()"></div>
  
  <div class="relative bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
      <h3 class="font-bold text-slate-800 text-lg">Nova Categoria de EPI</h3>
      <button (click)="handleClose()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="ph ph-x text-xl"></i>
      </button>
    </div>
    
    <div class="p-6">
      <form [formGroup]="formCategoria" (ngSubmit)="handleSave()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nome da Categoria</label>
          <input type="text" formControlName="nome" placeholder="Ex: Proteção Auditiva"
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-slate-600"
            [class.border-red-400]="formCategoria.get('nome')?.invalid && formCategoria.get('nome')?.touched">
        </div>
      </form>
    </div>
   
    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
      <button (click)="handleClose()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-200/50 rounded-lg transition-all">Cancelar</button>
      <button (click)="handleSave()" [disabled]="formCategoria.invalid" class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white px-6 py-2 rounded-lg text-sm font-bold transition-all shadow-md shadow-blue-200">Salvar Categoria</button>
    </div>
  </div>
</div>
