<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-300" (click)="handleClose()"></div>

  <div class="relative bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
      <h3 class="font-bold text-slate-800 text-lg">
        {{ categoriaParaEdicao ? 'Editar Categoria' : 'Nova Categoria de EPI' }}
      </h3>
      <button (click)="handleClose()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="ph ph-x text-xl"></i>
      </button>
    </div>

    <div class="p-6">
      <form [formGroup]="formCategoria" (ngSubmit)="handleSave()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nome da Categoria</label>
          <div class="relative">
            <i class="ph ph-tag absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
            <input 
              type="text" 
              formControlName="descricao"
              placeholder="Ex: Proteção Auditiva"
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-slate-600"
              [ngClass]="{'border-red-400 bg-red-50': formCategoria.get('descricao')?.invalid && formCategoria.get('descricao')?.touched}"
            >
          </div>
          <span *ngIf="formCategoria.get('descricao')?.invalid && formCategoria.get('descricao')?.touched" class="text-xs text-red-500 mt-1 block">
            <i class="ph ph-warning-circle"></i> A descrição deve ter pelo menos 3 caracteres.
          </span>
        </div>
        <button type="submit" class="hidden"></button>
      </form>
    </div>

    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
      <button (click)="handleClose()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-200/50 rounded-lg transition-all">
        Cancelar
      </button>
      <button 
        (click)="handleSave()" 
        [disabled]="formCategoria.invalid"
        class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white px-6 py-2 rounded-lg text-sm font-bold transition-all shadow-md shadow-blue-200 flex items-center gap-2"
      >
        <i class="ph" [ngClass]="categoriaParaEdicao ? 'ph-check-circle' : 'ph-plus-circle'"></i>
        {{ categoriaParaEdicao ? 'Atualizar' : 'Salvar Categoria' }}
      </button>
    </div>
  </div>
</div>
