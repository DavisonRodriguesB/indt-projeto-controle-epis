<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Cargos</h1>
      <p class="text-sm text-slate-500">Gerencie as funções e cargos cadastrados</p>
    </div>
    <button (click)="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-all shadow-sm shadow-blue-200">
      <i class="ph ph-plus-circle text-xl"></i>
      <span>Novo Cargo</span>
    </button>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Descrição do Cargo</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-center">Status</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        @for (cargo of cargos(); track cargo.id) {
          <tr class="hover:bg-slate-50/50 transition-colors" [ngClass]="{'bg-slate-50/30': !cargo.ativo}">
            <td class="px-6 py-4 flex items-center gap-3">
              <i class="ph ph-identification-card text-lg" [ngClass]="cargo.ativo ? 'text-slate-400' : 'text-slate-300'"></i>
              <span class="font-medium" [ngClass]="cargo.ativo ? 'text-slate-700' : 'text-slate-400 italic line-through'">
                {{ cargo.descricao }}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <span [class]="cargo.ativo ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'" 
                    class="px-2 py-1 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">
                {{ cargo.ativo ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="flex justify-end items-center gap-2">
                <button (click)="openModal(cargo)" class="text-slate-400 hover:text-blue-600 p-1" title="Editar">
                  <i class="ph ph-pencil-simple text-2xl"></i>
                </button>
                <button (click)="toggleStatus(cargo)" class="transition-all active:scale-95">
                  <i class="ph" [ngClass]="cargo.ativo ? 'ph-toggle-right text-emerald-500' : 'ph-toggle-left text-slate-300'" style="font-size: 32px;"></i>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<app-modal-cargo 
  [isOpen]="isModalOpen" 
  [cargoParaEdicao]="cargoSelecionado()"
  (onClose)="closeModal()" 
  (onSave)="salvarCargo($event)">
</app-modal-cargo>
