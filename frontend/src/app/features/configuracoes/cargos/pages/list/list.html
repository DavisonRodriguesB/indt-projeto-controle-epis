<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Cargos</h1>
      <p class="text-sm text-slate-500">Gerencie as funções e cargos cadastrados</p>
    </div>
    
    <button (click)="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-all shadow-sm shadow-blue-200">
      <i class="ph ph-plus-circle text-xl"></i>
      <span>Novo Cargo</span>
    </button>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Descrição do Cargo</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4 flex items-center gap-3">
            <i class="ph ph-identification-card text-slate-400 text-lg"></i>
            <span class="font-medium text-slate-700">Técnico de Segurança</span>
          </td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-3">
              <button class="text-slate-400 hover:text-blue-600 transition-colors p-1" title="Editar">
                <i class="ph ph-pencil-simple text-xl"></i>
              </button>
              <button class="text-slate-400 hover:text-red-600 transition-colors p-1" title="Excluir">
                <i class="ph ph-trash text-xl"></i>
              </button>
            </div>
          </td>
        </tr>
        <tr class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4 flex items-center gap-3">
            <i class="ph ph-identification-card text-slate-400 text-lg"></i>
            <span class="font-medium text-slate-700">Almoxarife</span>
          </td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-3">
              <button class="text-slate-400 hover:text-blue-600 transition-colors p-1" title="Editar">
                <i class="ph ph-pencil-simple text-xl"></i>
              </button>
              <button class="text-slate-400 hover:text-red-600 transition-colors p-1" title="Excluir">
                <i class="ph ph-trash text-xl"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="closeModal()"></div>

  <div class="relative bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
      <h3 class="font-bold text-slate-800 text-lg">Cadastrar Novo Cargo</h3>
      <button (click)="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="ph ph-x text-xl"></i>
      </button>
    </div>

    <div class="p-6">
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Descrição do Cargo</label>
          <input 
            type="text" 
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-slate-600"
          >
        </div>
      </form>
    </div>

    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
      <button (click)="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-200/50 rounded-lg transition-all">
        Cancelar
      </button>
      <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-bold transition-all shadow-md shadow-blue-200">
        Salvar
      </button>
    </div>
  </div>
</div>
