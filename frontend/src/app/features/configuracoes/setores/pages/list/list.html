<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Setores / Departamentos</h1>
      <p class="text-sm text-slate-500">Gerencie os locais de trabalho onde os colaboradores estão alocados</p>
    </div>
    
    <button (click)="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-all shadow-sm shadow-blue-200">
      <i class="ph ph-plus-circle text-xl"></i>
      <span>Novo Setor</span>
    </button>
  </div>

  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Descrição do Setor</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        
        <tr *ngFor="let setor of setores" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4 flex items-center gap-3">
            <i class="ph ph-tree-structure text-slate-400 text-lg"></i>
            <span class="font-medium text-slate-700">{{ setor.nomeSetor }}</span>
          </td>
          
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-3">
              <button class="text-slate-400 hover:text-blue-600 transition-colors p-1" title="Editar">
                <i class="ph ph-pencil-simple text-xl"></i>
              </button>
              
              <button (click)="excluirSetor(setor.id)" class="text-slate-400 hover:text-red-600 transition-colors p-1" title="Excluir">
                <i class="ph ph-trash text-xl"></i>
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="setores.length === 0">
          <td colspan="2" class="px-6 py-10 text-center text-slate-400 italic">
            Nenhum setor cadastrado. Clique em "Novo Setor" para adicionar.
          </td>
        </tr>

      </tbody>
    </table>
  </div>
</div>

<app-modal-setor 
  [isOpen]="isModalOpen" 
  (onClose)="closeModal()" 
  (onSave)="salvarSetor($event)">
</app-modal-setor>
