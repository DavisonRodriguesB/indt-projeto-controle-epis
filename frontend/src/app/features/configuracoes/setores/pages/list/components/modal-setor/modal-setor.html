<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform transition-all">
    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
      <h3 class="text-xl font-bold text-slate-800">
        {{ setorParaEdicao ? 'Editar Setor' : 'Novo Setor' }}
      </h3>
      <button (click)="handleClose()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <i class="ph ph-x text-2xl"></i>
      </button>
    </div>

    <form [formGroup]="formSetor" (ngSubmit)="handleSave()" class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Descrição do Setor</label>
        <div class="relative">
          <i class="ph ph-tree-structure absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
          <input 
            type="text" 
            formControlName="descricao"
            placeholder="Ex: Almoxarifado, Produção..." 
            class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
            [ngClass]="{'border-red-500 bg-red-50': formSetor.get('descricao')?.invalid && formSetor.get('descricao')?.touched}"
          >
        </div>
        <p *ngIf="formSetor.get('descricao')?.invalid && formSetor.get('descricao')?.touched" class="text-xs text-red-500 mt-1">
          A descrição é obrigatória (mínimo 3 caracteres).
        </p>
      </div>

      <div class="flex gap-3 pt-4">
        <button 
          type="button" 
          (click)="handleClose()" 
          class="flex-1 px-4 py-2 border border-slate-200 text-slate-600 font-medium rounded-lg hover:bg-slate-50 transition-colors">
          Cancelar
        </button>
        <button 
          type="submit" 
          [disabled]="formSetor.invalid"
          class="flex-1 px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm shadow-blue-200">
          {{ setorParaEdicao ? 'Salvar Alterações' : 'Cadastrar Setor' }}
        </button>
      </div>
    </form>
  </div>
</div>
