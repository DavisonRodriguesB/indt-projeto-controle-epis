<div class="max-w-2xl mx-auto p-4 md:p-0">
  
  <div class="flex items-center gap-4 mb-8">
    <button routerLink="/colaboradores" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
      <i class="ph ph-arrow-left text-2xl"></i>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Novo Colaborador</h2>
      <p class="text-slate-500">Registre os dados para controle de entrega de EPIs.</p>
    </div>
  </div>

  <form [formGroup]="colaboradorForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8 space-y-6">
   
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Nome Completo</label>
      <input 
        type="text" 
        formControlName="nome"
        placeholder="Digite o nome completo"
        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
        [class.border-red-400]="colaboradorForm.get('nome')?.invalid && colaboradorForm.get('nome')?.touched"
      >
      <span *ngIf="colaboradorForm.get('nome')?.invalid && colaboradorForm.get('nome')?.touched" class="text-red-500 text-xs mt-1">
        O nome é obrigatório e deve ter no mínimo 3 letras.
      </span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Nº Matrícula</label>
        <input 
          type="text" 
          formControlName="matricula"
          placeholder="000000"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none font-mono"
          [class.border-red-400]="colaboradorForm.get('matricula')?.invalid && colaboradorForm.get('matricula')?.touched"
        >
        <p class="text-[10px] text-slate-400 mt-1 uppercase">Deve ser única no sistema.</p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Cargo / Função</label>
        <div class="relative">
          <select 
            formControlName="cargo"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none cursor-pointer appearance-none text-slate-600"
            [class.border-red-400]="colaboradorForm.get('cargo')?.invalid && colaboradorForm.get('cargo')?.touched"
          >
            <option value="" disabled selected>Selecione o cargo...</option>
            <option *ngFor="let cargo of cargos" [value]="cargo.nome">
              {{ cargo.nome }}
            </option>
          </select>
          <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Setor / Departamento</label>
        <div class="relative">
          <select 
            formControlName="setor"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none cursor-pointer appearance-none text-slate-600"
            [class.border-red-400]="colaboradorForm.get('setor')?.invalid && colaboradorForm.get('setor')?.touched"
          >
            <option value="" disabled selected>Selecione o setor...</option>
            <option *ngFor="let setor of setores" [value]="setor.nome">
              {{ setor.nome }}
            </option>
          </select>
          <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Status</label>
        <div class="relative">
          <select 
            formControlName="status"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none cursor-pointer appearance-none text-slate-600"
          >
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
          <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row justify-end gap-3 pt-6 border-t border-slate-50">
      <button 
        type="button" 
        routerLink="/colaboradores"
        class="px-6 py-3 text-slate-600 font-medium hover:bg-slate-50 rounded-xl transition-colors order-2 md:order-1"
      >
        Cancelar
      </button>
      <button 
        type="submit" 
        class="px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-100 transition-all order-1 md:order-2 flex items-center justify-center gap-2"
      >
        Salvar Colaborador
      </button>
    </div>

  </form>
</div>
