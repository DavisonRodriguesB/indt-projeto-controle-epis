<div class="flex flex-col gap-6">
  <div class="flex justify-between items-end">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Colaboradores</h2>
      <p class="text-slate-500">Gerencie os funcionários habilitados para receber EPIs.</p>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-all">
      <i class="ph ph-plus-circle text-xl"></i>
      Novo Colaborador
    </button>
  </div>

  <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex gap-4">
    <div class="relative flex-1">
      <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
      <input 
        type="text" 
        [(ngModel)]="searchTerm"
        placeholder="Buscar por nome ou matrícula..." 
        class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500/20"
      >
    </div>
    <select class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none text-slate-600">
      <option value="">Todos os Setores</option>
      <option value="Produção">Produção</option>
      <option value="Engenharia">Engenharia</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Colaborador</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Matrícula</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Cargo / Setor</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Status</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr *ngFor="let item of colaboradoresFiltrados" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-xs">
                {{ item.nome | slice:0:1 }}
              </div>
              <span class="font-medium text-slate-800">{{ item.nome }}</span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-slate-600 font-mono">{{ item.matricula }}</td>
          <td class="px-6 py-4">
            <p class="text-sm text-slate-800">{{ item.cargo }}</p>
            <p class="text-xs text-slate-400">{{ item.setor }}</p>
          </td>
          <td class="px-6 py-4">
            <span [class]="item.ativo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" 
                  class="px-2 py-1 rounded-full text-[10px] font-bold uppercase">
              {{ item.ativo ? 'Ativo' : 'Inativo' }}
            </span>
          </td>
          <td class="px-6 py-4 text-right">
            <button class="text-slate-400 hover:text-blue-600 p-1"><i class="ph ph-pencil-simple text-xl"></i></button>
            <button class="text-slate-400 hover:text-red-600 p-1"><i class="ph ph-trash text-xl"></i></button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="colaboradoresFiltrados.length === 0" class="p-12 text-center">
      <i class="ph ph-users-three text-4xl text-slate-300"></i>
      <p class="text-slate-500 mt-2">Nenhum colaborador encontrado.</p>
    </div>
  </div>
</div>
