<div class="flex flex-col gap-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Colaboradores</h2>
      <p class="text-slate-500 text-sm">Controle de Funcionários</p>
    </div>
    <button routerLink="/colaboradores/novo" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-100">
      <i class="ph ph-plus-circle text-xl"></i>
      Novo Colaborador
    </button>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Colaborador</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Cargo / Setor</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr *ngFor="let item of colaboradoresFiltrados" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-xs shrink-0">
                {{ item.nome | slice:0:1 }}
              </div>
              <span class="font-medium text-slate-800">{{ item.nome }}</span>
            </div>
          </td>
          <td class="px-6 py-4">
            <p class="text-sm text-slate-800 font-medium">{{ item.cargo?.descricao || 'Sem Cargo' }}</p>
            <p class="text-xs text-slate-400">{{ item.setor?.descricao || 'Sem Setor' }}</p>
          </td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end items-center gap-4">
              <button [routerLink]="['/colaboradores/editar', item.id]" class="text-slate-400 hover:text-blue-600">
                <i class="ph ph-pencil-simple text-2xl"></i>
              </button>
              
              <button (click)="toggleStatus(item)" class="transition-all active:scale-95" [title]="item.status ? 'Inativar' : 'Ativar'">
                <i class="ph" 
                   [ngClass]="item.status ? 'ph-toggle-right text-emerald-500' : 'ph-toggle-left text-rose-500'" 
                   style="font-size: 34px;">
                </i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
