<div class="flex flex-col gap-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Usuarios</h2>
      <p class="text-slate-500 text-sm">Gestao de acesso ao sistema</p>
    </div>

    <button
      (click)="openModal()"
      [disabled]="saving()"
      class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white px-4 py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-100"
    >
      <i class="ph ph-user-plus text-xl"></i>
      {{ saving() ? 'Salvando...' : 'Novo Usuario' }}
    </button>
  </div>

  <div
    *ngIf="listErrorMessage()"
    class="bg-red-50 border border-red-100 text-red-700 text-sm px-4 py-3 rounded-lg"
  >
    {{ listErrorMessage() }}
  </div>

  <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4">
    <div class="relative flex-1">
      <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        placeholder="Buscar por nome ou e-mail"
        class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500/20"
      />
    </div>

    <select
      [(ngModel)]="selectedRole"
      class="w-full md:w-48 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 outline-none text-slate-600 cursor-pointer focus:ring-2 focus:ring-blue-500/20"
    >
      <option value="">Todos os perfis</option>
      <option value="admin">Administrador</option>
      <option value="almoxarife">Almoxarife</option>
    </select>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <div *ngIf="loading()" class="p-6 text-sm text-slate-500">
      Carregando usuarios...
    </div>

    <table *ngIf="!loading()" class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Usuario</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Perfil</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Acoes</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-100">
        <tr *ngFor="let user of usuariosFiltrados" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs shrink-0">
                {{ user.nome | slice:0:1 }}
              </div>
              <div>
                <p class="font-medium text-slate-800 leading-none">{{ user.nome }}</p>
                <p class="text-xs text-slate-400 mt-1">{{ user.email }}</p>
              </div>
            </div>
          </td>

          <td class="px-6 py-4 text-sm text-slate-600">
            <span class="flex items-center gap-1.5">
              <i
                class="ph"
                [ngClass]="user.role === 'admin' ? 'ph-shield-check text-orange-500' : 'ph-user text-blue-500'"
              ></i>
              {{ user.role === 'admin' ? 'Administrador' : 'Almoxarife' }}
            </span>
          </td>

          <td class="px-6 py-4 text-right">
            <button
              (click)="editUser(user)"
              [disabled]="saving()"
              class="text-slate-400 hover:text-blue-600 disabled:opacity-50 p-1 transition-colors"
            >
              <i class="ph ph-pencil-simple text-2xl"></i>
            </button>
          </td>
        </tr>

        <tr *ngIf="usuariosFiltrados.length === 0">
          <td colspan="3" class="px-6 py-8 text-center text-sm text-slate-500">
            Nenhum usuario encontrado.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-user-form
  *ngIf="isModalOpen"
  [userData]="selectedUser"
  [submitError]="formErrorMessage()"
  (onClose)="closeModal()"
  (onSave)="saveUser($event)"
></app-user-form>
