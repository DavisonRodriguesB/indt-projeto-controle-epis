<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
  <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
    
    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
      <h3 class="text-xl font-bold text-slate-800">{{ userData ? 'Editar' : 'Novo' }} Usuário</h3>
      <button type="button" (click)="close()" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-400">
        <i class="ph ph-x text-xl"></i>
      </button>
    </div>

    <div *ngIf="submitError" class="mx-6 mt-6 rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-700" role="alert">
      {{ submitError }}
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
        <input 
          type="text" 
          formControlName="nome"
          placeholder="Ex: João Silva"
          class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail</label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="joao@empresa.com"
          class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <div class="relative">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            formControlName="senha"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
          <button type="button" (click)="showPassword = !showPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
            <i class="ph" [ngClass]="showPassword ? 'ph-eye-closed' : 'ph-eye'"></i>
          </button>
        </div>
        <p *ngIf="userData" class="text-[10px] text-slate-400 mt-1 uppercase">Deixe em branco para manter a atual.</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Role</label>
          <div class="relative">
            <select formControlName="role" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl appearance-none outline-none cursor-pointer">
              <option value="admin">Administrador</option>
              <option value="almoxarife">Almoxarife</option>
            </select>
            <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-4">
        <button type="button" (click)="close()" class="px-6 py-2.5 text-slate-600 font-medium hover:bg-slate-50 rounded-xl transition-colors">
          Cancelar
        </button>
        <button type="submit" 
                [disabled]="userForm.invalid"
                class="px-8 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold rounded-xl shadow-lg shadow-blue-100 transition-all flex items-center gap-2">
          <i class="ph ph-floppy-disk text-lg"></i>
          Salvar
        </button>
      </div>
    </form>
  </div>
</div>
