<div class="p-6 max-w-6xl mx-auto space-y-6">

  <div *ngIf="erroApi" class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    {{ erroApi }}
  </div>
  
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Movimentação de EPI</h1>
      <p class="text-sm text-slate-500">Gerencie entregas aos colaboradores e saldo de estoque</p>
    </div>
    <div class="flex gap-3">
      <button (click)="openModalVisualizar()" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg font-medium hover:bg-slate-50 flex items-center gap-2 shadow-sm text-sm">
        <i class="ph ph-eye text-xl"></i> Visualizar Saldo
      </button>
      <button (click)="openModalSaldo()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium flex items-center gap-2 transition-all shadow-md shadow-emerald-100 text-sm">
        <i class="ph ph-plus-circle text-xl"></i> Incluir Saldo
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    
      <div class="lg:col-span-4">
        <app-formulario-entrega 
          [form]="formSaidaEpi"
          [colaboradores]="colaboradores"
          [estoque]="estoque"
          [erroSaldo]="erroSaldo"
          [colaboradorFixado]="colaboradorFixado"
          [itensIncluidos]="itensMovimentacao"
          (onIncluir)="incluirItemNaLista()"
          (onDesafixar)="desafixarColaborador()"
          (onLimparErro)="limparErro()">
        </app-formulario-entrega>
      </div>

      <div class="lg:col-span-8">
        <app-lista-resumo 
          [itens]="itensMovimentacao"
          [colaboradorFixado]="colaboradorFixado"
          [enviando]="enviandoMovimentacao"
          (onRemover)="removerItemLista($event)"
          (onFinalizar)="finalizarMovimentacao()">
        </app-lista-resumo>
      </div>

    </div>
  </div>

<app-modal-entrada-saldo 
  [isOpen]="isModalSaldoOpen"
  [form]="formEntradaSaldo"
  [estoque]="estoque"
  [nomeArquivo]="nomeArquivoAnexo"
  (onClose)="closeModalSaldo()"
  (onFile)="onFileSelected($event)"
  (onSalvar)="salvarNovoSaldo()">
</app-modal-entrada-saldo>

<div *ngIf="isModalVisualizarOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" (click)="closeModalVisualizar()"></div>
  <div class="relative bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in">
    <div class="p-5 border-b flex justify-between items-center bg-slate-50/50">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-blue-100 text-blue-600 rounded-lg"><i class="ph ph-database text-xl"></i></div>
        <h3 class="font-bold text-slate-800">Saldo Atual em Estoque</h3>
      </div>
      <button (click)="closeModalVisualizar()" class="text-slate-400 p-2"><i class="ph ph-x text-xl"></i></button>
    </div>
    <div class="p-0 max-h-[60vh] overflow-y-auto">
      <table class="w-full text-left">
        <thead class="text-slate-400 text-[10px] uppercase border-b bg-white sticky top-0">
          <tr><th class="px-6 py-3">Código</th><th class="px-6 py-3">Material (CA)</th><th class="px-6 py-3 text-right">Saldo</th></tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let item of estoque" class="text-sm hover:bg-slate-50/50">
            <td class="px-6 py-4 text-slate-500 font-mono text-xs">{{ item.codigo }}</td>
            <td class="px-6 py-4 font-semibold text-slate-700">{{ item.material }} ({{ item.ca }})</td>
            <td class="px-6 py-4 text-right">
              <span [class]="item.saldo > 5 ? 'text-emerald-600' : 'text-orange-500'" class="font-bold">{{ item.saldo }} un</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div *ngIf="isModalReciboOpen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm print:bg-white">
  <div class="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl print:shadow-none">
    <div class="p-4 border-b flex justify-between items-center bg-slate-50 print:hidden">
      <h3 class="font-bold text-slate-800 italic text-sm px-2">Pré-visualização do Protocolo</h3>
      <div class="flex gap-2">
        <button (click)="isModalReciboOpen = false" class="px-4 py-2 text-sm font-semibold text-slate-500 rounded-lg">Cancelar</button>
        <button (click)="imprimirRecibo()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold flex items-center gap-2 shadow-lg shadow-blue-200">
          <i class="ph ph-printer text-lg"></i> Gerar PDF
        </button>
      </div>
    </div>
    <app-relatorioepi [dados]="dadosParaRelatorio"></app-relatorioepi>
  </div>
</div>
