<div class="lg:col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4 h-fit">
  <h3 class="font-bold text-slate-800 flex items-center gap-2 border-b pb-3 text-sm uppercase tracking-wider">
    Preparar Entrega
  </h3>

  <form [formGroup]="form" class="space-y-4">
    
    <div>
      <label class="block text-xs font-semibold text-slate-500 uppercase mb-1.5">Colaborador</label>
      <div class="relative">
        <div class="relative">
          <i class="ph ph-user absolute left-3 top-3 text-slate-400"></i>
          <input 
            type="text"
            [(ngModel)]="searchColaborador"
            [ngModelOptions]="{standalone: true}"
            (input)="showColaboradorSuggestions = true"
            (focus)="showColaboradorSuggestions = true"
            [disabled]="colaboradorFixado !== null"
            placeholder="Digite o nome do colaborador..."
            class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-slate-600 font-semibold disabled:bg-blue-50 disabled:border-blue-200 disabled:text-blue-700"
          >
          <button type="button" *ngIf="searchColaborador || colaboradorFixado" (click)="limparSelecaoColaborador()" class="absolute right-3 top-2.5 text-slate-400 hover:text-rose-500">
            <i class="ph ph-x-circle text-2xl"></i>
          </button>
        </div>

        <ul *ngIf="showColaboradorSuggestions && colaboradoresFiltrados.length > 0" class="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto p-1">
          <li *ngFor="let colab of colaboradoresFiltrados" 
              (click)="selecionarColaborador(colab)"
              class="p-3 hover:bg-slate-50 rounded-lg cursor-pointer text-sm font-semibold text-slate-700 transition-colors">
            {{ colab }}
          </li>
        </ul>
        <div *ngIf="showColaboradorSuggestions" (click)="showColaboradorSuggestions = false" class="fixed inset-0 z-40"></div>
      </div>
    </div>

    <div class="pt-2">
      <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Material (EPI)</label>
      <div class="relative">
        <div class="relative">
          <i class="ph ph-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
          <input 
            type="text"
            [(ngModel)]="searchEpi"
            [ngModelOptions]="{standalone: true}"
            (input)="showEpiSuggestions = true"
            (focus)="showEpiSuggestions = true"
            placeholder="Digite nome, código ou CA..."
            class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-slate-600 font-semibold"
            [class.border-red-400]="erroSaldo || erroDuplicidade"
            [class.bg-blue-50]="form.get('epiId')?.value"
          >
          <button type="button" *ngIf="searchEpi" (click)="limparSelecaoEpi()" class="absolute right-3 top-2.5 text-slate-400 hover:text-rose-500">
            <i class="ph ph-x-circle text-2xl"></i>
          </button>
        </div>

        <ul *ngIf="showEpiSuggestions && estoqueFiltrado.length > 0" class="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-60 overflow-y-auto p-1">
          <li *ngFor="let item of estoqueFiltrado" 
              (click)="selecionarEpi(item)"
              [class.opacity-50]="item.saldo <= 0"
              class="flex flex-col p-3 hover:bg-slate-50 rounded-lg cursor-pointer border-b border-slate-50 last:border-0">
            <div class="flex justify-between items-start">
              <span class="font-bold text-slate-700 text-sm">{{ item.codigo }} - {{ item.material }}</span>
              <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase" [ngClass]="item.saldo > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'">
                Saldo: {{ item.saldo }}
              </span>
            </div>
            <span class="text-[11px] text-slate-400 mt-0.5">CA: {{ item.ca }}</span>
          </li>
        </ul>
        <div *ngIf="showEpiSuggestions" (click)="showEpiSuggestions = false" class="fixed inset-0 z-40"></div>
      </div>

      <div *ngIf="erroDuplicidade" class="mt-2 flex items-center gap-1.5 text-amber-600 bg-amber-50 p-2 rounded-lg border border-amber-100">
        <i class="ph ph-warning text-lg"></i>
        <span class="text-[10px] font-bold uppercase">{{ erroDuplicidade }}</span>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Quantidade</label>
      <input type="number" formControlName="quantidade" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none">
      <div *ngIf="erroSaldo" class="mt-2 flex items-center gap-1.5 text-red-500 bg-red-50 p-2 rounded-lg border border-red-100">
        <i class="ph ph-warning-circle text-lg"></i>
        <span class="text-[10px] font-bold uppercase">{{ erroSaldo }}</span>
      </div>
    </div>

    <button type="button" (click)="executarInclusao()" [disabled]="form.invalid || !!erroDuplicidade" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-100">
      <i class="ph ph-plus-circle text-xl"></i> Incluir na Lista
    </button>
  </form>
</div>
