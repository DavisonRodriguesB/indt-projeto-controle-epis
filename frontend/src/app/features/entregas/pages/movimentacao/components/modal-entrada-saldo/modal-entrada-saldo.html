<div *ngIf="isOpen" class="fixed inset-0 z-[60] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" (click)="onClose.emit()"></div>

  <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in">
    
    <div class="p-6 border-b flex justify-between items-center bg-emerald-50/30">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-emerald-100 text-emerald-600 rounded-lg"><i class="ph ph-plus-circle text-xl"></i></div>
        <h3 class="font-bold text-slate-800 text-lg">Entrada de Material</h3>
      </div>
      <button (click)="onClose.emit()" class="text-slate-400 p-2"><i class="ph ph-x text-xl"></i></button>
    </div>


    <div class="p-6">
      <form [formGroup]="form" class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Material</label>
          <select formControlName="materialCodigo" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl">
            <option value="">Selecione o EPI...</option>
            <option *ngFor="let item of estoque" [value]="item.codigo">{{ item.codigo }} - {{ item.material }} (Saldo: {{ item.saldo }})</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Qtd. Entrada</label>
            <input type="number" formControlName="quantidade" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Anexo NF</label>
            <label class="flex items-center justify-center gap-2 w-full px-4 py-2.5 bg-white border border-dashed border-slate-300 rounded-xl cursor-pointer">
              <i class="ph ph-paperclip"></i>
              <span class="text-xs truncate">{{ nomeArquivo || 'Anexar' }}</span>
              <input type="file" class="hidden" (change)="onFile.emit($event)">
            </label>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Observação</label>
          <textarea formControlName="observacao" rows="2" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm"></textarea>
        </div>
      </form>
    </div>
    
    <div class="p-4 bg-slate-50 border-t flex gap-3">
      <button (click)="onClose.emit()" class="flex-1 py-2.5 font-bold text-slate-500">Cancelar</button>
      <button (click)="onSalvar.emit()" [disabled]="form.invalid" class="flex-[2] py-2.5 bg-emerald-600 text-white font-bold rounded-xl shadow-lg">Confirmar Entrada</button>
    </div>
  </div>
</div>
