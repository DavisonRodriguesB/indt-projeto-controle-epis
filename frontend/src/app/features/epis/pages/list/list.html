<div class="flex flex-col gap-6">
  
  <div class="flex justify-between items-end">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Catálogo de EPIs</h2>
      <p class="text-slate-500">Controle técnico de Certificados de Aprovação (CA) e validade.</p>
    </div>
    <button 
     routerLink="/epis/novo"
            class="bg-blue-600 hover:bg-blue-700
          text-white px-4 py-2 rounded-lg font-medium flex 
            items-center gap-2 transition-all shadow-lg shadow-blue-100">
      <i class="ph ph-package text-xl"></i>
      Novo EPI
    </button>
  </div>

  <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex gap-4">
    <div class="relative flex-1">
      <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
      <input 
        type="text" 
        [(ngModel)]="searchTerm"
        placeholder="Buscar por nome ou número do CA" 
        class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500/20"
      >
    </div>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700">Equipamento</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-center">Nº CA</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-center">Vida Útil</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-center">Estoque Atual</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-700 text-right">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr *ngFor="let item of episFiltrados" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-4">
            <div class="flex flex-col">
              <span class="font-semibold text-slate-800">{{ item.nome }}</span>
              <span class="text-xs text-slate-400 uppercase tracking-tighter">{{ item.categoria }}</span>
            </div>
          </td>
          <td class="px-6 py-4 text-center">
            <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-mono font-bold">
              {{ item.numero_ca }}
            </span>
          </td>
          <td class="px-6 py-4 text-center text-sm text-slate-600">
            {{ item.vida_util_dias }} dias
          </td>
          
          <td class="px-6 py-4">
            <div class="flex flex-col items-center">
              <span [class]="item.estoque_atual <= item.estoque_minimo ? 'text-red-600 font-bold' : 'text-slate-800 font-medium'">
                {{ item.estoque_atual }} un.
              </span>
              <span *ngIf="item.estoque_atual <= item.estoque_minimo" 
                    class="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded-full font-semibold uppercase mt-1 animate-pulse">
                Estoque Baixo
              </span>
            </div>
          </td>

          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-2">
              <button class="text-slate-400 hover:text-blue-600 transition-colors"><i class="ph ph-pencil-simple text-xl"></i></button>
              <button class="text-slate-400 hover:text-red-600 transition-colors"><i class="ph ph-trash text-xl"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
