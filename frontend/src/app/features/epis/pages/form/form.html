<div class="max-w-3xl mx-auto p-4 md:p-0">
  
  <div class="flex items-center gap-4 mb-8">
    <button routerLink="/epis" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
      <i class="ph ph-arrow-left text-2xl"></i>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Novo Equipamento (EPI)</h2>
      <p class="text-slate-500">Cadastre itens para controle de CA e validade técnica.</p>
    </div>
  </div>

  <form [formGroup]="epiForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8 space-y-8">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="col-span-full">
        <label class="block text-sm font-semibold text-slate-700 mb-2">Descrição do Equipamento</label>
        <input 
          type="text" 
          formControlName="nome"
          placeholder="Ex: Luva de Vaqueta Cano Curto"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
          [class.border-red-400]="epiForm.get('nome')?.invalid && epiForm.get('nome')?.touched"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Cód. Produto / Interno</label>
        <input 
          type="text" 
          formControlName="codigo"
          placeholder="EPI-000"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none font-mono"
          [class.border-red-400]="epiForm.get('codigo')?.invalid && epiForm.get('codigo')?.touched"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Categoria</label>
        <div class="relative">
          <select 
            formControlName="categoria"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none cursor-pointer appearance-none text-slate-600"
            [class.border-red-400]="epiForm.get('categoria')?.invalid && epiForm.get('categoria')?.touched"
          >
            <option value="" disabled selected>Selecione a categoria...</option>
            <option *ngFor="let cat of categorias" [value]="cat.nome">
              {{ cat.nome }}
            </option>
          </select>
          <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Nº do CA</label>
        <input 
          type="text" 
          formControlName="ca"
          placeholder="00000"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none font-mono"
          [class.border-red-400]="epiForm.get('ca')?.invalid && epiForm.get('ca')?.touched"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Tempo de Vida Útil (Dias)</label>
        <div class="relative">
          <input 
            type="number" 
            formControlName="validade"
            placeholder="0"
            class="w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none font-mono"
            [class.border-red-400]="epiForm.get('validade')?.invalid && epiForm.get('validade')?.touched"
          >
          <span class="absolute right-4 top-3.5 text-xs text-slate-400 font-medium font-mono">DIAS</span>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row justify-end gap-3 pt-4 border-t border-slate-50">
      <button 
        type="button" 
        routerLink="/epis"
        class="px-6 py-3 text-slate-600 font-medium hover:bg-slate-100 rounded-xl transition-colors order-2 md:order-1"
      >
        Cancelar
      </button>
      <button 
        type="submit" 
        class="px-10 py-3 bg-blue-600 hover:bg-blue-700 
        text-white font-bold rounded-xl shadow-lg shadow-blue-100 
        transition-all order-1 md:order-2 flex items-center justify-center gap-2"
      >
        Salvar Equipamento
      </button>
    </div>

  </form>
</div>
