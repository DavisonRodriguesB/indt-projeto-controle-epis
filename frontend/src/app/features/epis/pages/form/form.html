<div class="max-w-3xl mx-auto p-4 md:p-0">
  <div class="flex items-center gap-4 mb-8">
    <button routerLink="/epis" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
      <i class="ph ph-arrow-left text-2xl"></i>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">{{ isEdicao ? 'Editar EPI' : 'Novo EPI' }}</h2>
      <p class="text-slate-500">Cadastre equipamentos e configure prazos de validade e estoque.</p>
    </div>
  </div>

  <form [formGroup]="epiForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8 space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-slate-700 mb-2">Nome do Equipamento</label>
        <input type="text" formControlName="nome" placeholder="Ex: Luva de Vaqueta Cano Curto"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Código Interno</label>
        <input type="text" formControlName="codigo" placeholder="EPI-001"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none font-mono">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Número do CA</label>
        <input type="text" formControlName="ca" placeholder="00000"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none font-bold text-blue-600">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Categoria</label>
        <select formControlName="categoriaId" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none appearance-none cursor-pointer">
          <option [ngValue]="null">Selecione...</option>
          <option *ngFor="let cat of categorias" [ngValue]="cat.id">{{ cat.descricao }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Data de Validade (CA)</label>
        <input type="date" formControlName="validade"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Estoque Atual</label>
        <input type="number" formControlName="estoqueAtual"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Estoque Mínimo (Alerta)</label>
        <input type="number" formControlName="estoqueMinimo"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Vida Útil (Dias)</label>
        <input type="number" formControlName="vidaUtilDias" placeholder="365"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Status</label>
        <select formControlName="ativo" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none appearance-none cursor-pointer">
          <option [ngValue]="true">Ativo / Disponível</option>
          <option [ngValue]="false">Inativo / Fora de Linha</option>
        </select>
      </div>
    </div>

    <div class="flex flex-col md:flex-row justify-end gap-3 pt-6 border-t border-slate-50">
      <button type="button" routerLink="/epis" class="px-6 py-3 text-slate-600 font-medium hover:bg-slate-50 rounded-xl transition-colors">Cancelar</button>
      <button type="submit" [disabled]="epiForm.invalid"
        class="px-10 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold rounded-xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2">
        <i class="ph ph-floppy-disk text-xl"></i>
        {{ isEdicao ? 'Salvar Alterações' : 'Salvar EPI' }}
      </button>
    </div>
  </form>
</div>
